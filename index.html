<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 { font-size: 2rem; letter-spacing: 4px; color: #e94560; }

    #status {
      font-size: 1.1rem;
      color: #a8dadc;
      height: 1.5rem;
    }

    #hint {
      font-size: 0.78rem;
      color: #555;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      position: relative;
    }

    .cell:hover:not(.taken):not(.ghost) { background: #0f3460; transform: scale(1.05); }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    /* Ghost: piece is fading — opponent can claim it next turn */
    .cell.ghost {
      opacity: 0.28;
      animation: ghostPulse 0.9s ease-in-out infinite;
      cursor: default;
    }

    /* Small number badge showing move order */
    .cell .badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.65rem;
      font-weight: normal;
      opacity: 0.45;
      line-height: 1;
    }

    .cell.win { background: #0f3460; animation: pulse 0.5s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes ghostPulse {
      0%, 100% { opacity: 0.28; }
      50%       { opacity: 0.12; }
    }

    #scores {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 10px;
    }

    .score-box .label { font-size: 0.75rem; color: #888; letter-spacing: 2px; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; margin-top: 2px; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #f4a261; }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="scores">
    <div class="score-box x-score">
      <div class="label">X WINS</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">DRAWS</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O WINS</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>
  <div id="hint">After 3 pieces, your oldest fades and frees up next turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button onclick="resetBoard()">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const MAX_PIECES = 3;

    // board[i]: null | 'X' | 'O'
    // ghostCells: Set of indices currently fading (still occupying board[i])
    // moveQueues[player]: ordered list of cell indices that player owns
    let board, current, gameOver, scores, ghostCells, moveQueues;

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => move(+cell.dataset.i)));

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      ghostCells = new Set();
      moveQueues = { X: [], O: [] };
      scores = { X: 0, O: 0, draw: 0 };
    }

    init();

    function move(i) {
      // Ghost cells and occupied cells are blocked
      if (gameOver || board[i] !== null) return;

      const opponent = current === 'X' ? 'O' : 'X';

      // Clear opponent's ghost pieces — they become free this turn
      for (const gi of [...ghostCells]) {
        if (board[gi] === opponent) {
          board[gi] = null;
          cells[gi].textContent = '';
          cells[gi].className = 'cell';
          ghostCells.delete(gi);
        }
      }

      // Place piece
      board[i] = current;
      moveQueues[current].push(i);
      renderCell(i, current, moveQueues[current].length);

      // If player now has more than MAX_PIECES, oldest starts fading
      if (moveQueues[current].length > MAX_PIECES) {
        const oldest = moveQueues[current].shift();
        ghostCells.add(oldest);
        cells[oldest].classList.add('ghost');
        // Remove badge from ghost since it's leaving
        const badge = cells[oldest].querySelector('.badge');
        if (badge) badge.remove();
        // board[oldest] stays set so it can't be clicked
      }

      // Refresh order badges for current player's remaining pieces
      refreshBadges(current);

      // Check win (ghost cells don't count)
      const win = checkWin();
      if (win) {
        win.forEach(wi => cells[wi].classList.add('win'));
        scores[current]++;
        updateScores();
        status.textContent = `${current} wins!`;
        gameOver = true;
        return;
      }

      current = opponent;
      status.textContent = `${current}'s turn`;
    }

    function renderCell(i, player, _order) {
      cells[i].textContent = player;
      cells[i].className = `cell ${player.toLowerCase()} taken`;
    }

    function refreshBadges(player) {
      // Re-number each non-ghost cell for this player (1 = oldest, will fade next)
      moveQueues[player].forEach((ci, idx) => {
        if (ghostCells.has(ci)) return;
        let badge = cells[ci].querySelector('.badge');
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'badge';
          cells[ci].appendChild(badge);
        }
        badge.textContent = idx + 1;
      });
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c] &&
        !ghostCells.has(a) && !ghostCells.has(b) && !ghostCells.has(c)
      ) || null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    function resetBoard() {
      const savedScores = scores;
      init();
      scores = savedScores;
      status.textContent = "X's turn";
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }
  </script>
</body>
</html>
